name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
   security-checks:
     runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # 🔐 Gitleaks (Secrets Scan)
    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2

    # 🔐 SAST (SonarQube alternative basic scan)
    - name: Run SAST
      run: |
        echo "Running basic static analysis..."

    # 🔐 IaC Scan
    - name: Run Checkov
      run: |
        pip install checkov
        checkov -d . --soft-fail
    
    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v2
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-and-scan:
    runs-on: ubuntu-latest
    needs: security-checks

    steps:
    - uses: actions/checkout@v3

    - name: Build Docker Image
      run: |
        docker build -t devsecopsacr123.azurecr.io/app:v1 .

    # 🔐 Trivy Scan
    - name: Scan Docker Image
      run: |
        docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
        aquasec/trivy image devsecopsacr123.azurecr.io/app:v1

  deploy:
   runs-on: ubuntu-latest
   needs: build-and-scan

   steps:
   - uses: actions/checkout@v3

   - name: Azure Login
     uses: azure/login@v1
     with:
      creds: ${{ secrets.AZURE_CREDENTIALS }}

   - name: Login to ACR
     run: |
      az acr login --name devsecopsacr123

   - name: Build Docker Image
     run: |
      docker build -t devsecopsacr123.azurecr.io/app:v1 .

   - name: Push to ACR
     run: |
      docker push devsecopsacr123.azurecr.io/app:v1

   - name: Deploy to AKS
     run: |
      az aks get-credentials \
        --resource-group devsecops-rg \
        --name devsecops-aks \
        --overwrite-existing

      kubectl apply -f k8s/deployment.yaml
